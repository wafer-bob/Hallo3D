name: "hallo3d-magic3d-coarse-sd"
tag: "${rmspace:${system.prompt_processor.prompt},_}"
exp_root_dir: "outputs"
seed: 0

data_type: "random-camera-datamodule"
data:
  batch_size: 4 # multi-view appearance alignment operates on 4 views
  width: 64
  height: 64
  camera_distance_range: [1.5, 2.0]
  elevation_range: [-10, 45]
  light_sample_strategy: "magic3d"
  eval_camera_distance: 2.0
  eval_fovy_deg: 70.

system_type: "magic3d-system"
system:
  geometry_type: "implicit-volume"
  geometry:
    radius: 2.
    normal_type: analytic
    pos_encoding_config:
      otype: HashGrid
      n_levels: 16
      n_features_per_level: 2
      log2_hashmap_size: 19
      base_resolution: 16
      per_level_scale: 1.4472692374403782 # max resolution 4096
    density_bias: "blob_magic3d"
    density_activation: softplus
    density_blob_scale: 10.
    density_blob_std: 0.5
    isosurface_resolution: 128
    isosurface_threshold: auto
    isosurface_coarse_to_fine: true

  material_type: "diffuse-with-point-light-material"
  material:
    ambient_only_steps: 2001 # identical to the baseline defaults
    soft_shading: true

  background_type: "neural-environment-map-background"

  renderer_type: "nerf-volume-renderer"
  renderer:
    radius: ${system.geometry.radius}
    num_samples_per_ray: 512

  prompt_processor_type: "stable-diffusion-prompt-processor"
  prompt_processor:
    pretrained_model_name_or_path: "stabilityai/stable-diffusion-2-1-base"
    prompt: ???

  guidance_type: "hallo3d-sd-guidance"
  guidance:
    pretrained_model_name_or_path: "stabilityai/stable-diffusion-2-1-base"
    weighting_strategy: uniform
    guidance_scale: 100.
    min_step_percent: 0.02
    max_step_percent: 0.98
    # --- Hallo3D ---
    enable_appearance_alignment: true
    align_mode: extend # NeRF trained from scratch (docs/DIAGNOSIS.md)
    focal_fovy_threshold_deg: 48.0
    enable_hallucination_detection: true
    lmm_server_url: "http://127.0.0.1:39122"
    enable_cg_loss: true
    cg_start_step: 2200
    cg_interval: 4
    cg_ddim_steps: 20
    cg_guidance_scale: 7.5
    general_negative_prompt: "unnatural colors, poor lighting, low quality, artifacts, smooth texture"

  loggers:
    wandb:
      enable: false
      project: "threestudio"
      name: None

  loss:
    lambda_sds: 1.
    lambda_cg: 0.1 # w in Eq. 8 (Sec. 4.5)
    lambda_orient: [0, 10., 1000., 5000] # identical to the baseline defaults
    lambda_sparsity: 1.
    lambda_opaque: 0.

  optimizer:
    name: Adam
    args:
      lr: 0.01
      betas: [0.9, 0.99]
      eps: 1.e-15
    params:
      geometry:
        lr: 0.01
      background:
        lr: 0.001

trainer:
  max_steps: 2500 # 10000 / 4 with batch_size 4 (Appendix B)
  log_every_n_steps: 1
  num_sanity_val_steps: 0
  val_check_interval: 200
  enable_progress_bar: true
  precision: 16-mixed

checkpoint:
  save_last: true
  save_top_k: -1
  every_n_train_steps: ${trainer.max_steps}
